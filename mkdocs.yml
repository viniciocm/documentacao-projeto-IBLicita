site_name: Documentação IBLicita
theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep-orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep-orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro

plugins:
  - search
  - with-pdf:
      author: Vinicio Cerqueira
      copyright: IBLicita 2026
      title_page: true
      output_path: documentacao-iblicita.pdf
      icon_config:
        download_button: true

extra_css:
  - stylesheets/extra.css

nav:
  - Início: index.md
  - Módulos:
      - Exemplo de HU: exemplo/exemplo-hu.md
  - Arquivos:
      - Baixar PDF: documentacao-iblicita.pdf # Plan B: Link direto no menu