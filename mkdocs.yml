site_name: Documentação IBLicita
site_description: Portal de Requisitos e Especificações Técnicas # Aqui remove o "None"
site_author: Vinicio Cerqueira

theme:
  name: material
  language: pt-BR
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep-orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep-orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro

plugins:
  - search
  - with-pdf:
      author: Vinicio Cerqueira
      copyright: IBLicita 2026
      title_page: true
      toc_title: "Sumário" # Aqui traduz o "Table of Contents"
      cover: true
      cover_title: "Documentação Técnica"
      cover_subtitle: "Portifólio de Requisitos e Especificações Técnicas"
      output_path: documentacao-iblicita.pdf
      icon_config:
        download_button: true

extra_css:
  - stylesheets/extra.css

nav:
  - Início: index.md
  - Módulos:
      - Exemplo de HU: exemplo/exemplo-hu.md